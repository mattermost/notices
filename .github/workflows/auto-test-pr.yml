name: Auto-create test PR on master
 
on:
  pull_request:
    types: [opened, reopened]
    branches:
      - release
 
jobs:
  create-test-pr:
    name: Mirror PR against master
    runs-on: ubuntu-latest
    # No 'permissions' block — GITHUB_TOKEN is not used here.
    # A PAT is required because the org policy prevents Actions from
    # creating PRs via the default GITHUB_TOKEN identity.
 
    steps:
      - name: Create test PR against master
        env:
          # NOTICES_BOT_PAT must be set in repo Settings → Secrets and variables → Actions.
          # The PAT needs: repo scope (or pull_requests:write + contents:read for fine-grained).
          # It must belong to a user/account that has write access to this repo.
          GH_TOKEN: ${{ secrets.NOTICES_BOT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.label }}
          PR_URL:    ${{ github.event.pull_request.html_url }}
          REPO:      ${{ github.repository }}
        run: |
          gh pr create \
            --repo "$REPO" \
            --head "$HEAD_BRANCH" \
            --base master \
            --title "[Test] $PR_TITLE" \
            --body "$(cat <<EOF
          Automated test PR for #$PR_NUMBER.
 
          Merging this into \`master\` will mirror the notices to:
          https://notices.mattermost.com/pre-release/notices.json
 
          **Original release PR:** $PR_URL
 
          ---
          To test on a server, run:
          \`\`\`
          /cloud upgrade <your-server> \\
            --env MM_AnnouncementSettings_NoticesURL=https://notices.mattermost.com/pre-release/notices.json \\
            --env MM_AnnouncementSettings_NoticesFetchFrequency=60
          \`\`\`
          EOF
          )"
